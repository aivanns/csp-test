# Общие security headers — подключается через include во всех location-блоках.
# Файл нужно скопировать как: /etc/nginx/sites-available/csp-test-headers.conf
#
# Эти заголовки вешаются на ВСЕ ответы (и HTML, и статику):
#   - X-Frame-Options        — защита от clickjacking
#   - X-Content-Type-Options — защита от MIME-sniffing (особенно важно для .js/.css)
#   - Referrer-Policy        — контроль отправки Referer заголовка
#   - Permissions-Policy     — запрет браузерных API (геолокация, камера и т.д.)

add_header X-Frame-Options          "DENY"                                    always;
add_header X-Content-Type-Options   "nosniff"                                 always;
add_header Referrer-Policy          "strict-origin-when-cross-origin"         always;
add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
