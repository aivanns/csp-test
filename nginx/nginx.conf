server {
    listen 80;
    server_name localhost;

    root /var/www/csp-test/browser;
    index index.html;

    set $csp_nonce $request_id;

    location = /index.html {
        gzip off;

        sub_filter "CSP_NONCE_PLACEHOLDER" "$csp_nonce";
        sub_filter_once on;

        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'nonce-$csp_nonce'; style-src 'self' 'nonce-$csp_nonce' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none';"
            always;

        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
