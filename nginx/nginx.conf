##############################################################
# Nginx config для Angular 21 + CSP с nonce
#
# Как работает nonce:
# 1. Nginx генерирует уникальный nonce ($request_id) на каждый запрос
# 2. Подставляет его в заголовок CSP (script-src/style-src 'nonce-...')
# 3. Через sub_filter заменяет "CSP_NONCE_PLACEHOLDER" в index.html
#    на тот же nonce — Angular подхватывает его через ngCspNonce
#
# Почему add_header дублируется в каждом location:
# В nginx если location-блок имеет хотя бы один собственный add_header,
# он ПЕРЕСТАЁТ наследовать add_header из родительского server-блока.
# Решение: выносим общие заголовки в include-файл (headers/security.conf)
# и подключаем в каждом location явно.
##############################################################

server {
    listen 80;
    server_name localhost;  # Замени на свой домен

    root /var/www/csp-test/browser;  # Путь к dist/csp-test/browser после ng build
    index index.html;

    # -----------------------------------------------------------
    # Nonce: уникальный 32-символьный hex на каждый HTTP-запрос
    # -----------------------------------------------------------
    set $csp_nonce $request_id;

    # -----------------------------------------------------------
    # Итоговая строка CSP (однострочная — nginx не принимает переносы в заголовках)
    # -----------------------------------------------------------
    set $csp_header "default-src 'self'; script-src 'self' 'nonce-$csp_nonce'; style-src 'self' 'nonce-$csp_nonce' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';";

    # ============================================================
    # location 1: index.html
    #   - sub_filter подставляет nonce в атрибут ngCspNonce
    #   - no-store кэш (нельзя кэшировать — у каждого запроса свой nonce!)
    #   - CSP заголовок + все security headers
    # ============================================================
    location = /index.html {
        sub_filter "CSP_NONCE_PLACEHOLDER" "$csp_nonce";
        sub_filter_once off;  # заменяем ВСЕ вхождения: ngCspNonce + meta[name="csp-nonce"]

        # CSP нужен только здесь — это единственный HTML-файл
        add_header Content-Security-Policy    $csp_header                                always;

        # Security headers нужны на всех ответах (включаем через include)
        include /etc/nginx/sites-available/csp-test-headers.conf;

        # index.html НЕЛЬЗЯ кэшировать — nonce меняется на каждый запрос
        add_header Cache-Control "no-store, no-cache, must-revalidate"  always;
        add_header Pragma        "no-cache"                             always;
    }

    # ============================================================
    # location 2: JS, CSS, шрифты, картинки — статика с долгим кэшем
    #   - CSP НЕ нужен (браузер их загружает как sub-ресурсы страницы,
    #     политика уже применена через index.html)
    #   - Security headers всё равно вешаем (X-Content-Type-Options особенно
    #     важен для JS/CSS — защита от MIME-sniffing атак)
    # ============================================================
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;

        # Security headers на статику (без CSP — он тут не нужен)
        include /etc/nginx/sites-available/csp-test-headers.conf;

        access_log off;
    }

    # ============================================================
    # location 3: SPA fallback
    #   - Все Angular-маршруты отдают index.html
    #   - try_files сначала ищет файл, потом директорию, потом fallback
    # ============================================================
    location / {
        try_files $uri $uri/ /index.html;
    }
}


