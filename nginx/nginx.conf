##############################################################
# Nginx config для Angular 21 + CSP с nonce
#
# Как работает nonce:
# 1. Nginx генерирует случайный nonce на каждый запрос через $request_id
# 2. Подставляет его в заголовок CSP
# 3. Через sub_filter заменяет CSP_NONCE_PLACEHOLDER в index.html
#    на тот же nonce — Angular подхватывает его через ngCspNonce
##############################################################

# Основной http-блок (если используешь как отдельный файл — убери этот блок)
# http {
#   включи этот файл через: include /etc/nginx/sites-enabled/csp-test.conf;
# }

server {
    listen 80;
    server_name localhost;  # Замени на свой домен

    root /var/www/csp-test/browser;  # Путь к dist/csp-test/browser после ng build
    index index.html;

    # -----------------------------------------------------------
    # Генерация nonce из request_id (hex, достаточно случайный)
    # $request_id — уникальный 32-символьный hex на каждый запрос
    # -----------------------------------------------------------
    set $csp_nonce $request_id;

    # -----------------------------------------------------------
    # Content Security Policy
    # -----------------------------------------------------------
    set $csp "
        default-src 'self';
        script-src  'self' 'nonce-$csp_nonce';
        style-src   'self' 'nonce-$csp_nonce' 'unsafe-inline';
        img-src     'self' data:;
        font-src    'self';
        connect-src 'self';
        object-src  'none';
        base-uri    'self';
        form-action 'self';
        frame-ancestors 'none';
    ";

    # Убираем переносы из переменной (nginx не любит переносы в заголовках)
    # Используем map-блок — см. ниже. Здесь — упрощённая однострочная версия:
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'nonce-$csp_nonce'; style-src 'self' 'nonce-$csp_nonce' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
        always;

    # -----------------------------------------------------------
    # Дополнительные security headers
    # -----------------------------------------------------------
    add_header X-Frame-Options          "DENY"                              always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # -----------------------------------------------------------
    # Подмена плейсхолдера в index.html на реальный nonce
    # Именно so Angular подхватит nonce через атрибут ngCspNonce
    # -----------------------------------------------------------
    location = /index.html {
        # sub_filter ищет строку и заменяет на nonce
        sub_filter "CSP_NONCE_PLACEHOLDER" "$csp_nonce";
        sub_filter_once on;     # заменяем только первое вхождение
        sub_filter_types text/html;

        # Отключаем кэш для index.html — иначе nonce будет одинаковый для всех!
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;

        # Повторяем CSP header (add_header не наследуется в location)
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'nonce-$csp_nonce'; style-src 'self' 'nonce-$csp_nonce' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
            always;
        add_header X-Frame-Options          "DENY"                              always;
        add_header X-Content-Type-Options   "nosniff"                           always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
    }

    # -----------------------------------------------------------
    # Статика Angular — долгий кэш (файлы имеют хэш в имени)
    # -----------------------------------------------------------
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -----------------------------------------------------------
    # SPA fallback — все маршруты Angular отдают index.html
    # -----------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}


